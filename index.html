<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Inkkme Tattoo Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif;}
body{background:#000;color:#fff;display:flex;justify-content:center;}
.app{width:100%;max-width:430px;min-height:100vh;}

/* HEADER */
.header{padding:20px;}
.top{display:flex;align-items:center;}
.logo{width:90px;height:90px;border-radius:50%;border:2px solid orange;background:#111;display:flex;align-items:center;justify-content:center;font-weight:bold;}
.stats{display:flex;justify-content:space-around;flex:1;}
.stat{text-align:center;cursor:pointer;}
.infinity{font-size:22px;color:orange;}

/* BIO */
.bio{margin-top:10px;font-size:13px;line-height:1.4;}

/* HIGHLIGHTS */
.highlights{display:flex;gap:14px;overflow-x:auto;padding:14px;}
.highlight{text-align:center;cursor:pointer;}
.highlight .circle{width:68px;height:68px;border-radius:50%;border:2px solid orange;background:#111;}
.highlight span{font-size:11px;margin-top:5px;display:block;}

/* PAGES */
.page{display:none;}
.page.active{display:block;}

.topbar{display:flex;align-items:center;padding:12px;}
.back{font-size:22px;cursor:pointer;}

/* STORY VIEW */
.story{height:85vh;display:flex;align-items:center;justify-content:center;position:relative;}
.story-box{width:90%;height:100%;background:#111;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:18px;text-align:center;}
.tap{position:absolute;top:0;width:50%;height:100%;}
.tap.left{left:0;}
.tap.right{right:0;}
</style>
</head>

<body>
<div class="app">

<!-- MAIN PAGE -->
<div id="main" class="page active">
  <div class="header">
    <div class="top">
      <div class="logo">LOGO</div>
      <div class="stats">
        <div class="stat"><div>70k+</div><small>Works</small></div>
        <div class="stat" onclick="openFollowers()"><div class="infinity">∞</div><small>Followers</small></div>
        <div class="stat"><div>2</div><small>Following</small></div>
      </div>
    </div>

    <div class="bio">
      <b>Inkkme Tattoo Studio</b><br>
      Since 2013 | Certified & Award-Winning<br>
      Versatile Custom Tattoos — All Styles, All Stories<br>
      “Crafted with precision. Worn with pride.”
    </div>
  </div>

  <!-- HIGHLIGHTS -->
  <div class="highlights">
    <div class="highlight" onclick="openHighlight('Tattoo')"><div class="circle"></div><span>Tattoo</span></div>
    <div class="highlight" onclick="openHighlight('Piercing')"><div class="circle"></div><span>Piercing</span></div>
    <div class="highlight" onclick="openHighlight('Laser')"><div class="circle"></div><span>Laser</span></div>
    <div class="highlight" onclick="openHighlight('Pigmentation')"><div class="circle"></div><span>Pigmentation</span></div>
    <div class="highlight" onclick="openHighlight('Training')"><div class="circle"></div><span>Training</span></div>
    <div class="highlight" onclick="openHighlight('Coverups')"><div class="circle"></div><span>Cover-ups</span></div>
  </div>
</div>

<!-- FOLLOWERS PAGE -->
<div id="followers" class="page">
  <div class="topbar">
    <div class="back" onclick="goHome()">←</div>
  </div>
  <div class="story" style="flex-direction:column;justify-content:center;">
    <div class="story-box">Followers Page</div>
    <div style="margin-top:10px; font-size:16px;">∞</div>
  </div>
</div>

<!-- STORY PAGE -->
<div id="storyPage" class="page">
  <div class="topbar">
    <div class="back" onclick="goHome()">←</div>
    <div id="storyTitle" style="margin-left:10px;"></div>
  </div>

  <div class="story">
    <div class="tap left" onclick="prevStory()"></div>
    <div class="story-box" id="storyContent"></div>
    <div class="tap right" onclick="nextStory()"></div>
  </div>
</div>

</div>

<script>
let currentHighlight="";
let index=0;

const stories={
  "Tattoo":[
    "Minimalist","Fine Line","Line Art","Micro Tattoos","Geometric","Mandala","Dotwork","Blackwork","Blackout",
    "Tribal","Polynesian","Maori","Celtic","Ornamental","Sacred Geometry","Floral","Botanical","Nature",
    "Animal","Bird","Mythical Creatures","Dragon","Phoenix","Angel","Demon","Skull","Gothic","Dark Art","Horror",
    "Chicano","Lettering","Calligraphy","Typography","Quotes","Name Tattoos","Portrait (Realistic)","Black & Grey Realism",
    "Color Realism","Hyper-Realism","3D","Surreal","Abstract","Watercolor","Trash Polka","Neo-Traditional","Traditional (Old School)",
    "New School","Japanese (Irezumi)","Anime / Manga","Pop Culture","Movie / Series Inspired","Gaming Tattoos","Music / Band",
    "Patchwork Tattoos","Flash Tattoos","Cyber Sigilism","Zodiac","Astrology","Celestial (Sun, Moon, Stars)","Spiritual",
    "Om & Sanskrit","Yantra","Chakra","Temple / Mandir Art","Lord Shiva","Lord Vishnu","Lord Brahma","Lord Ganesha",
    "Lord Hanuman","Lord Rama","Lord Krishna","Ravan","Lord Kartikeya (Murugan)","Lord Narasimha","Lord Venkateshwara (Balaji)",
    "Goddess Durga","Goddess Kali","Goddess Lakshmi","Goddess Saraswati","Goddess Parvati","Goddess Radha",
    "Navgraha","Warrior / Mahakal Art","Couple / Bond Tattoos","Fine-Detail Custom Tattoos","Custom Concept Tattoos",
    "Scar-Cover Tattoos"
  ],
  "Piercing":[
    "Lobe","Upper Lobe","Helix","Forward Helix","Flat","Conch","Tragus","Anti-Tragus","Daith","Rook",
    "Snug","Industrial","Orbital","Vertical Industrial","Eyebrow","Bridge","Nostril","High Nostril","Septum",
    "Cheek (Dimple)","Anti-Eyebrow","Labret","Vertical Labret","Medusa (Philtrum)","Monroe","Madonna",
    "Snake Bites","Spider Bites","Angel Bites","Smiley","Frowny","Tongue","Navel","Inverse Navel",
    "Nipple","Chest","Surface Piercing","Microdermal","Collarbone","Wrist","Hip","Custom / Anatomy-Based Piercing"
  ],
  "Laser":["Before Laser","After Laser","Fade Process"],
  "Pigmentation":["Lip Pigmentation","Scalp Pigmentation"],
  "Training":["Workshop","Live Practice","Certification"],
  "Coverups":["Name Cover","Dark Cover","Scar Cover","Old Tattoo Cover"]
};

function openHighlight(name){
  currentHighlight=name;
  index=0;
  document.getElementById("storyTitle").innerText=name;
  showStory();
  showPage("storyPage");
}

function showStory(){
  document.getElementById("storyContent").innerText = stories[currentHighlight][index];
}

function nextStory(){
  if(index < stories[currentHighlight].length-1){
    index++;
    showStory();
  }
}

function prevStory(){
  if(index > 0){
    index--;
    showStory();
  }
}

function openFollowers(){
  showPage("followers");
}

function goHome(){
  showPage("main");
}

function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
</script>

</body>
</html>
